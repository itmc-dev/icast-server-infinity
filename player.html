<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Website</title>
</head>
<body>
    <h2>Now Playing:</h2>
    <p id="songInfo">Loading...</p>

    <script>
        async function updateMetadata() {
            try {
                const response = await fetch("http://127.0.0.1:4500/status-json.xsl");
                const data = await response.json();
                
                // Extract song title
                let songTitle = data.icestats.source.title;
                console.log(songTitle);
                // Update HTML
                document.getElementById("songInfo").innerText = "Now Playing: " + songTitle;
            } catch (error) {
                console.error("Error fetching metadata:", error);
                document.getElementById("songInfo").innerText = "Failed to load metadata";
            }
        }

        // Update metadata every 10 seconds
        setInterval(updateMetadata, 10000);
        updateMetadata();
    </script>

    <audio controls autoplay>
        <source src="http://127.0.0.1:4500/stream" type="audio/mpeg">
        Your browser does not support the audio tag.
    </audio>

    <iframe src="http://localhost:4500/status.xsl" width="500" height="300"></iframe>
</body>
</html>
