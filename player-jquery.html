<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
function fetchSongTitle() {
    $.getJSON("http://your-server-ip:4500/status-json.xsl", function(data) {
        let songTitle = data.icestats.source.title;
        $("#nowPlaying").text("Now Playing: " + songTitle);
    });
}

// Refresh metadata every 10 seconds
setInterval(fetchSongTitle, 10000);
fetchSongTitle();
</script>

<p id="nowPlaying">Loading...</p>
